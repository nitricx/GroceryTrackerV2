<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scan Text</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<style>
  :root {
    --ink: #0b0d0c;
    --line: #2c332f;
    --accent: #baff29;
    --accent-dim: #baff2933;
    --text: #eef2ee;
    --text-dim: #9aa39c;
    --mono: 'SFMono-Regular', 'JetBrains Mono', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--ink);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    overscroll-behavior: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #video, #shotCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #shotCanvas { display: none; }

  #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .box {
    position: absolute;
    border: 1.5px solid var(--accent);
    background: var(--accent-dim);
    border-radius: 3px;
    opacity: 0;
    transform: scale(0.92);
    animation: pop 0.28s ease forwards;
    pointer-events: auto;
  }

  .box.tapped {
    background: #baff2966;
    border-color: #fff;
  }

  @keyframes pop {
    to { opacity: 1; transform: scale(1); }
  }

  #topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #000000aa, transparent);
    z-index: 10;
  }

  #brand {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #brand .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  #counter {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  #counter b { color: var(--accent); font-weight: 600; }

  #bottombar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 24px calc(env(safe-area-inset-bottom, 0px) + 28px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(0deg, #000000cc, transparent);
    z-index: 10;
  }

  #scanBtn {
    width: 74px;
    height: 74px;
    border-radius: 50%;
    background: transparent;
    border: 3px solid var(--text);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #scanBtn::before {
    content: '';
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--text);
    transition: transform 0.15s ease, background 0.15s ease;
  }

  #scanBtn:active::before {
    transform: scale(0.86);
  }

  #scanBtn.busy {
    border-color: var(--accent);
    pointer-events: none;
  }

  #scanBtn.busy::before {
    background: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(0.55); }
    50% { transform: scale(0.7); }
  }

  #hint {
    position: absolute;
    bottom: 118px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    z-index: 10;
    transition: opacity 0.3s ease;
  }

  .corner {
    position: fixed;
    width: 22px;
    height: 22px;
    border-color: var(--accent);
    opacity: 0.55;
    z-index: 9;
  }
  .corner.tl { top: 90px; left: 18px; border-top: 2px solid; border-left: 2px solid; }
  .corner.tr { top: 90px; right: 18px; border-top: 2px solid; border-right: 2px solid; }
  .corner.bl { bottom: 108px; left: 18px; border-bottom: 2px solid; border-left: 2px solid; }
  .corner.br { bottom: 108px; right: 18px; border-bottom: 2px solid; border-right: 2px solid; }

  #gate {
    position: fixed;
    inset: 0;
    z-index: 30;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
  }

  #gate.hidden { display: none; }

  #gate .glyph {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }

  #gate h1 {
    font-size: 21px;
    font-weight: 600;
    margin: 0 0 10px;
    line-height: 1.35;
  }

  #gate p {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 320px;
    margin: 0 0 26px;
  }

  #gateBtn {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    background: var(--accent);
    border: none;
    border-radius: 999px;
    padding: 14px 30px;
  }

  #gateBtn:active { opacity: 0.85; }

  #gateErr {
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: #ff7a6b;
    max-width: 300px;
    line-height: 1.5;
  }

  #tray {
    position: fixed;
    left: 14px;
    right: 14px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 118px);
    max-height: 30vh;
    overflow-y: auto;
    background: #0e120fee;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    z-index: 11;
    transform: translateY(140%);
    transition: transform 0.3s cubic-bezier(.2,.8,.2,1);
  }

  #tray.show { transform: translateY(0); }

  #tray .trayHead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  #tray .trayHead span {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #trayCopy {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: none;
    border: 1px solid var(--accent-dim);
    border-radius: 999px;
    padding: 5px 12px;
  }

  #trayText {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="shotCanvas"></canvas>
  <div id="overlay"></div>
</div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="topbar">
  <div id="brand"><span class="dot"></span>scan</div>
  <div id="counter"></div>
</div>

<div id="hint">Frame some text, then tap the shutter</div>

<div id="tray">
  <div class="trayHead">
    <span id="trayLabel">0 selected</span>
    <button id="trayCopy">Copy</button>
  </div>
  <div id="trayText"></div>
</div>

<div id="bottombar">
  <button id="scanBtn" aria-label="Scan for text"></button>
</div>

<div id="gate">
  <div class="glyph">Text Scan · MVP</div>
  <h1>Point your camera<br>at text to detect it</h1>
  <p>This needs access to your camera. Nothing leaves your phone — recognition runs locally in the browser.</p>
  <button id="gateBtn">Enable camera</button>
  <div id="gateErr"></div>
</div>

<script>
(function () {
  const video = document.getElementById('video');
  const shotCanvas = document.getElementById('shotCanvas');
  const overlay = document.getElementById('overlay');
  const scanBtn = document.getElementById('scanBtn');
  const gate = document.getElementById('gate');
  const gateBtn = document.getElementById('gateBtn');
  const gateErr = document.getElementById('gateErr');
  const hint = document.getElementById('hint');
  const counter = document.getElementById('counter');
  const tray = document.getElementById('tray');
  const trayText = document.getElementById('trayText');
  const trayLabel = document.getElementById('trayLabel');
  const trayCopy = document.getElementById('trayCopy');

  let stream = null;
  let selected = new Set();
  let wordMap = {};

  async function startCamera() {
    gateErr.textContent = '';
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      gate.classList.add('hidden');
    } catch (err) {
      gateErr.textContent = describeError(err);
    }
  }

  function describeError(err) {
    if (err && err.name === 'NotAllowedError') {
      return "Camera permission was denied. Enable it in your browser's site settings and reload.";
    }
    if (err && err.name === 'NotFoundError') {
      return 'No camera was found on this device.';
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      return 'Camera access requires HTTPS. Open this page over a secure connection.';
    }
    return 'Could not access the camera: ' + (err && err.message ? err.message : 'unknown error');
  }

  gateBtn.addEventListener('click', startCamera);

  function clearBoxes() {
    overlay.innerHTML = '';
    selected.clear();
    wordMap = {};
    updateTray();
  }

  function setBusy(isBusy) {
    scanBtn.classList.toggle('busy', isBusy);
    hint.style.opacity = isBusy ? '0' : '1';
    hint.textContent = isBusy ? '' : 'Frame some text, then tap the shutter';
  }

  function captureFrame() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const maxEdge = 1000;
    const scale = Math.min(1, maxEdge / Math.max(vw, vh));
    const cw = Math.round(vw * scale);
    const ch = Math.round(vh * scale);
    shotCanvas.width = cw;
    shotCanvas.height = ch;
    const ctx = shotCanvas.getContext('2d');
    ctx.drawImage(video, 0, 0, cw, ch);
    return { canvas: shotCanvas, scale, cw, ch, vw, vh };
  }

  // Maps a bbox from canvas pixel space to on-screen overlay space,
  // accounting for object-fit: cover cropping between the video's
  // native resolution and its rendered box.
  function mapBoxToScreen(bbox, frame) {
    const rect = video.getBoundingClientRect();
    const videoAspect = frame.vw / frame.vh;
    const boxAspect = rect.width / rect.height;

    let renderScale, offsetX = 0, offsetY = 0;
    if (videoAspect > boxAspect) {
      renderScale = rect.height / frame.vh;
      offsetX = (frame.vw * renderScale - rect.width) / 2;
    } else {
      renderScale = rect.width / frame.vw;
      offsetY = (frame.vh * renderScale - rect.height) / 2;
    }

    const toVideoPx = (v) => v / frame.scale;

    const x0 = toVideoPx(bbox.x0) * renderScale - offsetX;
    const y0 = toVideoPx(bbox.y0) * renderScale - offsetY;
    const x1 = toVideoPx(bbox.x1) * renderScale - offsetX;
    const y1 = toVideoPx(bbox.y1) * renderScale - offsetY;

    return { left: x0, top: y0, width: x1 - x0, height: y1 - y0 };
  }

  function renderBoxes(words, frame) {
    clearBoxes();
    let id = 0;
    words.forEach((w) => {
      if (!w.text || !w.text.trim()) return;
      if (w.confidence < 35) return;
      const pos = mapBoxToScreen(w.bbox, frame);
      if (pos.width < 4 || pos.height < 4) return;

      const el = document.createElement('div');
      el.className = 'box';
      el.style.left = pos.left + 'px';
      el.style.top = pos.top + 'px';
      el.style.width = pos.width + 'px';
      el.style.height = pos.height + 'px';
      el.style.animationDelay = (Math.random() * 0.15) + 's';

      const wid = 'w' + (id++);
      wordMap[wid] = w.text;
      el.dataset.id = wid;

      el.addEventListener('click', () => toggleWord(wid, el));
      overlay.appendChild(el);
    });

    counter.innerHTML = Object.keys(wordMap).length
      ? Object.keys(wordMap).length + ' <b>words found</b>'
      : 'no text found';
  }

  function toggleWord(id, el) {
    if (selected.has(id)) {
      selected.delete(id);
      el.classList.remove('tapped');
    } else {
      selected.add(id);
      el.classList.add('tapped');
    }
    updateTray();
  }

  function updateTray() {
    if (selected.size === 0) {
      tray.classList.remove('show');
      return;
    }
    const words = Array.from(overlay.children)
      .filter(el => selected.has(el.dataset.id))
      .map(el => wordMap[el.dataset.id]);
    trayText.textContent = words.join(' ');
    trayLabel.textContent = selected.size + ' selected';
    tray.classList.add('show');
  }

  trayCopy.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(trayText.textContent);
      trayCopy.textContent = 'Copied';
      setTimeout(() => trayCopy.textContent = 'Copy', 1200);
    } catch (e) {
      trayCopy.textContent = 'Failed';
      setTimeout(() => trayCopy.textContent = 'Copy', 1200);
    }
  });

  let worker = null;
  async function getWorker() {
    if (worker) return worker;
    worker = await Tesseract.createWorker('eng');
    return worker;
  }

  scanBtn.addEventListener('click', async () => {
    if (!stream) return;
    setBusy(true);
    counter.textContent = '';
    try {
      const frame = captureFrame();
      const w = await getWorker();
      const { data } = await w.recognize(frame.canvas);
      renderBoxes(data.words || [], frame);
    } catch (err) {
      hint.style.opacity = '1';
      hint.textContent = 'Recognition failed — try again';
      console.error(err);
    } finally {
      setBusy(false);
    }
  });

  // Re-clear boxes if the viewport rotates/resizes, since positions
  // would otherwise go stale relative to the new video layout.
  window.addEventListener('resize', clearBoxes);
})();
</script>
</body>
</html>
